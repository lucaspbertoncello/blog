createArticle:
  handler: src/functions/articles/article/create.handler
  events:
    - httpApi:
        method: POST
        path: /articles
        authorizer:
          name: jwtAuthorizer

editArticle:
  handler: src/functions/articles/article/update.handler
  events:
    - httpApi:
        method: PATCH
        path: /articles/{articleId}
        authorizer:
          name: jwtAuthorizer

deleteArticle:
  handler: src/functions/articles/article/delete.handler
  events:
    - httpApi:
        method: DELETE
        path: /articles/{articleId}
        authorizer:
          name: jwtAuthorizer

submitArticle:
  handler: src/functions/articles/workflow/submit.handler
  events:
    - httpApi:
        method: PATCH
        path: /articles/{articleId}/submit
        authorizer:
          name: jwtAuthorizer

publishArticle:
  handler: src/functions/articles/workflow/publish.handler
  events:
