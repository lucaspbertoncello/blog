createArticle:
  handler: src/functions/articles/createArticle.handler
  events:
    - httpApi:
        method: POST
        path: /articles
        authorizer:
          name: jwtAuthorizer

editArticle:
  handler: src/functions/articles/editArticle.handler
  events:
    - httpApi:
        method: PATCH
        path: /articles/{articleId}
        authorizer:
          name: jwtAuthorizer

submitArticle:
  handler: src/functions/articles/submitArticle.handler
  events:
    - httpApi:
        method: PATCH
        path: /articles/{articleId}/submit
        authorizer:
          name: jwtAuthorizer

publishArticle:
  handler: src/functions/articles/publishArticle.handler
  events:
    - httpApi:
        method: PATCH
        path: /articles/{articleId}/publish
        authorizer:
          name: jwtAuthorizer

rejectArticle:
  handler: src/functions/articles/rejectArticle.handler
  events:
    - httpApi:
        method: PATCH
        path: /articles/{articleId}/reject
        authorizer:
          name: jwtAuthorizer

listPublishedArticles:
  handler: src/functions/articles/listPublishedArticles.handler
  events:
    - httpApi:
        method: GET
        path: /articles/feed

listArticlesByStatus:
  handler: src/functions/articles/listArticlesByStatus.handler
  events:
    - httpApi:
        method: GET
        path: /articles
        authorizer:
          name: jwtAuthorizer

getPublicArticleBySlug:
  handler: src/functions/articles/getPublicArticleBySlug.handler
  events:
    - httpApi:
        method: GET
        path: /articles/public/{articleId}

getArticleBySlug:
  handler: src/functions/articles/getArticleBySlug.handler
  events:
    - httpApi:
        method: GET
        path: /articles/{articleId}
        authorizer:
          name: jwtAuthorizer

createComment:
  handler: src/functions/articles/comments/createComment.handler
  events:
    - httpApi:
        method: POST
        path: /articles/{articleId}/comments
        authorizer:
          name: jwtAuthorizer

editComment:
  handler: src/functions/articles/comments/editComment.handler
  events:
    - httpApi:
        method: PATCH
        path: /articles/{articleId}/comments/{commentId}
        authorizer:
          name: jwtAuthorizer

deleteComment:
  handler: src/functions/articles/comments/deleteComment.handler
  events:
    - httpApi:
        method: DELETE
        path: /articles/{articleId}/comments/{commentId}
        authorizer:
          name: jwtAuthorizer

listArticleComments:
  handler: src/functions/articles/comments/listArticleComments.handler
  events:
    - httpApi:
        method: GET
        path: /articles/{articleId}/comments
        authorizer:
          name: jwtAuthorizer

listAccountComments:
  handler: src/functions/articles/comments/listAccountComments.handler
  events:
    - httpApi:
        method: GET
        path: /accounts/{accountId}/comments
        authorizer:
          name: jwtAuthorizer
