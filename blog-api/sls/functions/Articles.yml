        method: PATCH
        path: /articles/{articleId}/publish
        authorizer:
          name: jwtAuthorizer

rejectArticle:
  handler: src/functions/articles/workflow/reject.handler
  events:
    - httpApi:
        method: PATCH
        path: /articles/{articleId}/reject
        authorizer:
          name: jwtAuthorizer

