createArticle:
  handler: src/functions/articles/createArticle.handler
  events:
    - httpApi:
        method: POST
        path: /articles
        authorizer:
          name: jwtAuthorizer

editArticle:
  handler: src/functions/articles/editArticle.handler
  events:
    - httpApi:
        method: PATCH
        path: /articles/{articleId}
        authorizer:
          name: jwtAuthorizer

