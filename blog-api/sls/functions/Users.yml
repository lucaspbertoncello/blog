getMe:
  handler: src/functions/users/getMe.handler
  events:
    - httpApi:
        method: GET
        path: /me
        authorizer:
          name: jwtAuthorizer
listAllAccounts:
  handler: src/functions/users/listAllAccounts.handler
  events:
    - httpApi:
        method: GET
        path: /accounts
        authorizer:
          name: jwtAuthorizer
