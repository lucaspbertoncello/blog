signup:
  handler: src/functions/auth/signup.handler
  events:
    - httpApi:
        method: POST
        path: /auth/signup

confirmCode:
  handler: src/functions/auth/confirmCode.handler
  events:
    - httpApi:
        method: POST
        path: /auth/confirm-code

signin:
  handler: src/functions/auth/signin.handler
  events:
    - httpApi:
        method: POST
        path: /auth/signin

postConfirmation:
  handler: src/functions/auth/postConfirmation.handler

preTokenGeneration:
  handler: src/functions/auth/preTokenGeneration.handler
